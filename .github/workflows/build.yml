name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build build_index
        run: cargo build --release --bin build_index

      - name: Download references.json.gz
        run: |
          curl -L -o /tmp/references.json.gz \
            https://github.com/zanfranceschi/rinha-de-backend-2026/raw/main/resources/references.json.gz

      - name: Run build_index
        run: ./target/release/build_index /tmp/references.json.gz resources/index.bin

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/solution-x:latest
            ghcr.io/${{ github.repository_owner }}/solution-x:${{ github.sha }}
