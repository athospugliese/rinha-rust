worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    use epoll;
}

stream {
    upstream backend {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
    }
    server {
        listen 9999 reuseport backlog=4096;
        proxy_pass backend;
        proxy_connect_timeout 200ms;
    }
}
