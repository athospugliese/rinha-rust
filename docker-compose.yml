services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "10MB"

  api1:
    image: ${SOLUTION_X_IMAGE:-ghcr.io/athospugliese/solution-x:latest}
    environment:
      UDS_PATH: "/sockets/api1.sock"
    volumes:
      - sockets:/sockets
    security_opt:
      - seccomp:unconfined
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "170MB"

  api2:
    image: ${SOLUTION_X_IMAGE:-ghcr.io/athospugliese/solution-x:latest}
    environment:
      UDS_PATH: "/sockets/api2.sock"
    volumes:
      - sockets:/sockets
    security_opt:
      - seccomp:unconfined
    depends_on:
      - api1
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "170MB"

volumes:
  sockets:
